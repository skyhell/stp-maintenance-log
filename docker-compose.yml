services:
  app:
    build: .
    image: stp-maintenance:latest
    container_name: stp-maintenance
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Keep data on the mounted volume regardless of .env.
      DATABASE_URL: "sqlite:///./data/app.db"
      UPLOAD_DIR: "./data/uploads"
      BACKUP_DIR: "./data/backups"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
