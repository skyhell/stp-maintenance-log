{% extends "base.html" %}
{% block main_class %}auth-wrap{% endblock %}
{% block content %}
<div class="auth-card card">
  <div class="auth-logo">💧</div>
  <h1 style="text-align:center; font-size:1.4rem;">{{ t('app.title') }}</h1>
  <p class="muted text-sm" style="text-align:center; margin-bottom:22px;">{{ t('login.welcome') }}</p>

  {% if error %}
  <div class="flash flash-error">{{ t(error) }}</div>
  {% endif %}

  <form method="post" action="/login" autocomplete="on">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="field">
      <label for="username">{{ t('login.username') }}</label>
      <input id="username" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">{{ t('login.password') }}</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn" style="width:100%;" type="submit">{{ t('login.submit') }}</button>
  </form>

  <div style="text-align:center; margin-top:18px;">
    <div class="lang-switch" style="justify-content:center;">
      {% for l in supported_languages %}
      <a href="/lang/{{ l }}" class="{% if l == lang %}active{% endif %}">{{ l|upper }}</a>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
