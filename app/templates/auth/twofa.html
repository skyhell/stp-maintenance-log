{% extends "base.html" %}
{% block main_class %}auth-wrap{% endblock %}
{% block content %}
<div class="auth-card card">
  <div class="auth-logo">🔒</div>
  <h1 style="text-align:center; font-size:1.4rem;">{{ t('twofa.login_title') }}</h1>
  <p class="muted text-sm" style="text-align:center; margin-bottom:22px;">{{ t('twofa.login_prompt') }}</p>

  {% if error %}<div class="flash flash-error">{{ t(error) }}</div>{% endif %}

  <form method="post" action="/login/2fa">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="field">
      <label for="code">{{ t('twofa.code') }}</label>
      <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code"
             autofocus required style="text-align:center; letter-spacing:0.3em; font-size:1.2rem;">
    </div>
    <button class="btn" style="width:100%;" type="submit">{{ t('twofa.verify') }}</button>
  </form>
  <div style="text-align:center; margin-top:16px;">
    <a href="/logout" class="text-sm muted">← {{ t('nav.login') }}</a>
  </div>
</div>
{% endblock %}
